<mat-form-field appearance="outline">

  <mat-label>
      Search Customer
  </mat-label>

  <input
      matInput
      [formControl]="searchControl"
      [matAutocomplete]="auto">

</mat-form-field>

<mat-autocomplete
    #auto="matAutocomplete">

  @for (
      customer of customers();
      track customer.id
  ) {

      <mat-option
          [value]="customer.name">

          {{ customer.name }}

      </mat-option>

  }

</mat-autocomplete>
