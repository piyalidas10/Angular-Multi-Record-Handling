version: "3.9"

services:

  angular-app:

    build:
      context: ../frontend

    ports:
      - "4200:4200"

    command: npm start

    volumes:
      - ../frontend:/app

    depends_on:
      - node-api

  node-api:

    build:
      context: ../backend

    command: npm run dev

    ports:
      - "3000:3000"

    volumes:
      - ../backend:/app

    depends_on:
      - redis

  redis:

    image: redis:7-alpine

    ports:
      - "6379:6379"